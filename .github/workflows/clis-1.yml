    - if: ${{ always() }}
      name: 🔴 =means=> here's relevant logs
      run: |
        ! grep -C20 -F ' >>> ' $CARGOGREEN_LOG_PATH

    - if: ${{ always() && env.CARGOGREEN_FINAL_PATH != '' }}
