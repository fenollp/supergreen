#     - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
#       with:
#         toolchain: 1.94.0
#         cache-on-failure: true
#     - run: cargo green supergreen sync
#     - run: cargo green supergreen builder rm || true
