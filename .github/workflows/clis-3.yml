      run: |
        false \
        || docker build --tag regist3 - <<<'FROM docker.io/registry:3' \
        || docker build --tag regist3 - <<<'FROM mirror.gcr.io/registry:3' \
        || docker build --tag regist3 - <<<'FROM public.ecr.aws/docker/registry:3' \
