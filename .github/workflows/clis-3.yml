    - name: Check that generated binary matches sha256
      run: |
        [[ "$BINHASHED" = "$(sha256sum /tmp/bin/get)" ]]

    - run: rm -rf /tmp/bin/* $CARGO_TARGET_DIR/* >/dev/null
    - name: 🔵 Reuse locally cached results...
      run: |
        unset CARGO_PROFILE_DEV_DEBUG
        unset CARGO_REGISTRIES_CRATES_IO_PROTOCOL
        unset CARGO_TERM_COLOR
        unset CARGO_UNSTABLE_SPARSE_REGISTRY
        env  CARGOGREEN_RUNNER=none \
          cargo green -vv install --locked --force --root=/tmp cargo-config2@0.1.39 --example=get |& tee _
    - name: ...is blazingly fearlessly lightspeed fast
      run: |
        grep Finished ./_ || exit 1
        grep Finished ./_ | grep -E ....s || exit 1
    - if: ${{ job.steps.do-try.outcome != 'success' && job.steps.do-try-jobs1.outcome != 'success' }}
      name: 🔴 =means=> it's again that cargo issue https://github.com/rust-lang/cargo/pull/14322
      run: |
        ! grep -C20 -F 'src/cargo/util/dependency_queue.rs:' _

